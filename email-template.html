<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Template</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; background-color: #f4f4f4; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background-color: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { color: #7C3AED; }
        .info { margin-bottom: 20px; }
        .info p { margin: 5px 0; }
        .message { background-color: #f9f9f9; padding: 15px; border-left: 4px solid #7C3AED; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Liên hệ từ Website</h1>
        <div class="info">
            <p><strong>Từ:</strong> {{from_name}} ({{from_email}})</p>
            <p><strong>Chủ đề:</strong> {{subject}}</p>
            <p><strong>Thời gian gửi:</strong> {{date}} {{time}}</p>
        </div>
        <div class="message">
            <h3>Nội dung tin nhắn:</h3>
            <p>{{message}}</p>
        </div>
        <p style="margin-top: 20px; font-size: 12px; color: #666;">
            Email này được gửi từ form liên hệ trên website của Phạm Phú Toàn.
        </p>
    </div>
</body>
</html>
